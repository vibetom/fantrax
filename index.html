<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantrax League Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
    h1 { text-align: center; margin-bottom: 8px; font-size: 1.6rem; color: #f8fafc; }
    .subtitle { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 0.9rem; }
    .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .tab { padding: 8px 20px; border: 1px solid #334155; border-radius: 6px; background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.9rem; transition: all 0.15s; }
    .tab:hover { border-color: #60a5fa; color: #e2e8f0; }
    .tab.active { background: #1e40af; border-color: #3b82f6; color: #fff; }
    .panel { display: none; max-width: 1000px; margin: 0 auto; }
    .panel.active { display: block; }
    .loading { text-align: center; color: #64748b; padding: 40px; }
    .error { text-align: center; color: #f87171; padding: 40px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 10px 12px; background: #1e293b; color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; border-bottom: 2px solid #334155; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e293b; }
    tr:hover td { background: #1e293b; }
    .rank { color: #60a5fa; font-weight: 700; }
    .team-name { font-weight: 600; color: #f8fafc; }
    .roster-section { margin-bottom: 24px; }
    .roster-section h3 { color: #60a5fa; margin-bottom: 8px; font-size: 1rem; padding: 8px 12px; background: #1e293b; border-radius: 6px; }
    pre { background: #1e293b; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 0.8rem; color: #cbd5e1; max-height: 600px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>Fantrax League Dashboard</h1>
  <p class="subtitle">Fantasy Baseball</p>

  <div class="tabs">
    <button class="tab active" data-tab="standings">Standings</button>
    <button class="tab" data-tab="rosters">Rosters</button>
    <button class="tab" data-tab="league">League Info</button>
    <button class="tab" data-tab="raw">Raw JSON</button>
  </div>

  <div id="standings" class="panel active"><div class="loading">Loading standings...</div></div>
  <div id="rosters" class="panel"><div class="loading">Loading rosters...</div></div>
  <div id="league" class="panel"><div class="loading">Loading league info...</div></div>
  <div id="raw" class="panel"><div class="loading">Select a tab first to load data...</div></div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    const cache = {};

    async function fetchData(endpoint) {
      if (cache[endpoint]) return cache[endpoint];
      const resp = await fetch(`/api/${endpoint}`);
      if (!resp.ok) throw new Error(`API returned ${resp.status}`);
      const data = await resp.json();
      cache[endpoint] = data;
      return data;
    }

    // Render standings
    async function loadStandings() {
      const el = document.getElementById('standings');
      try {
        const data = await fetchData('standings');
        updateRaw('standings', data);

        // Try to find the standings array in the response
        const rows = data.standings || data.rows || data.data || [];
        if (Array.isArray(rows) && rows.length > 0) {
          const keys = Object.keys(rows[0]);
          el.innerHTML = `<table>
            <thead><tr>${keys.map(k => `<th>${k}</th>`).join('')}</tr></thead>
            <tbody>${rows.map(row =>
              `<tr>${keys.map(k => `<td>${row[k] ?? ''}</td>`).join('')}</tr>`
            ).join('')}</tbody>
          </table>`;
        } else {
          // Fallback: show raw JSON nicely
          el.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
      } catch (e) {
        el.innerHTML = `<div class="error">Failed to load standings: ${e.message}</div>`;
      }
    }

    // Render rosters
    async function loadRosters() {
      const el = document.getElementById('rosters');
      try {
        const data = await fetchData('rosters');
        updateRaw('rosters', data);

        const rosters = data.rosters || data.teams || data.data;
        if (rosters && typeof rosters === 'object') {
          if (Array.isArray(rosters)) {
            el.innerHTML = rosters.map(team => `
              <div class="roster-section">
                <h3>${team.name || team.teamName || 'Team'}</h3>
                <pre>${JSON.stringify(team, null, 2)}</pre>
              </div>
            `).join('');
          } else {
            // Object keyed by team ID
            el.innerHTML = Object.entries(rosters).map(([id, team]) => `
              <div class="roster-section">
                <h3>${team.name || team.teamName || id}</h3>
                <pre>${JSON.stringify(team, null, 2)}</pre>
              </div>
            `).join('');
          }
        } else {
          el.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
      } catch (e) {
        el.innerHTML = `<div class="error">Failed to load rosters: ${e.message}</div>`;
      }
    }

    // Render league info
    async function loadLeagueInfo() {
      const el = document.getElementById('league');
      try {
        const data = await fetchData('league_info');
        updateRaw('league_info', data);
        el.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      } catch (e) {
        el.innerHTML = `<div class="error">Failed to load league info: ${e.message}</div>`;
      }
    }

    // Raw JSON panel
    const rawData = {};
    function updateRaw(key, data) {
      rawData[key] = data;
      const el = document.getElementById('raw');
      el.innerHTML = Object.entries(rawData).map(([k, v]) =>
        `<h3 style="color:#60a5fa;margin:12px 0 6px">/api/${k}</h3><pre>${JSON.stringify(v, null, 2)}</pre>`
      ).join('');
    }

    // Load standings immediately, others on tab click
    loadStandings();

    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.tab === 'standings') loadStandings();
        if (btn.dataset.tab === 'rosters') loadRosters();
        if (btn.dataset.tab === 'league') loadLeagueInfo();
      });
    });
  </script>
</body>
</html>
